name: Build Windows EXE

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Deep Clean Environment
        run: |
          if exist .next rmdir /s /q .next
          if exist out rmdir /s /q out
          if exist dist rmdir /s /q dist
          if exist release rmdir /s /q release
          cd src-tauri && cargo clean
        shell: cmd

      - name: Install Node.js dependencies
        run: npm ci

      - name: Build Next.js frontend
        run: npm run build

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Build Windows EXE with Tauri CLI
        run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""

      - name: Clean release folder
        run: |
          if exist release rmdir /s /q release
        shell: cmd

      - name: Create portable folder
        run: |
          mkdir release
          mkdir release\models
          copy src-tauri\target\release\voice-intel-app.exe release\
          echo { > release\config.json
          echo   "llm": { >> release\config.json
          echo     "enabled": true, >> release\config.json
          echo     "url": "http://localhost:11434", >> release\config.json
          echo     "model": "llama3.2:latest", >> release\config.json
          echo     "timeout_seconds": 60, >> release\config.json
          echo     "prompt_template1": "Verbessere folgenden Text sprachlich, füge Struktur hinzu und gib ihn als professionellen, formatierten Text zurück:\n\n{{text}}", >> release\config.json
          echo     "prompt_template2": "Fasse den Text zusammen als Bullet-Liste:\n\n{{text}}", >> release\config.json
          echo     "prompt_template3": "Schreibe den Text im Stil von Shakespeare:\n\n{{text}}", >> release\config.json
          echo     "prompt_template4": "Bullshit Bingo. Wenn ein Begriff aus der Kategorie Berufsleben/Management im transkribierten Text auftaucht, dann mache ihn in der enriched Version Fett:\n\n{{text}}" >> release\config.json
          echo   } >> release\config.json
          echo } >> release\config.json
        shell: cmd

      - name: Upload as artifact
        uses: actions/upload-artifact@v4
        with:
          name: voice-intel-windows-portable
          path: release\
          retention-days: 7
          overwrite: true
