name: Build Windows EXE

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:  # Manueller Trigger über GitHub UI

jobs:
  build-windows:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y cmake clang libssl-dev pkg-config

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Node.js dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: x86_64-pc-windows-msvc

      - name: Install xwin (Windows MSVC toolchain)
        run: cargo install xwin

      - name: Configure Cargo for Windows cross-compilation
        run: |
          mkdir -p ~/.cargo
          cat >> ~/.cargo/config.toml <<EOF
[target.x86_64-pc-windows-msvc]
linker = "xwin cl"
ar = "xwin ar"
EOF

      - name: Build Windows EXE
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Create portable folder
        run: |
          mkdir -p release
          cp src-tauri/target/x86_64-pc-windows-msvc/release/voice-intel-app.exe release/
          cat > release/config.json <<'EOF'
{
  "llm": {
    "enabled": true,
    "url": "http://localhost:11434",
    "model": "llama3.2:latest",
    "timeout_seconds": 60,
    "prompt_template1": "Verbessere folgenden Text sprachlich, füge Struktur hinzu und gib ihn als professionellen, formatierten Text zurück:\n\n{{text}}",
    "prompt_template2": "Fasse den Text zusammen als Bullet-Liste:\n\n{{text}}",
    "prompt_template3": "Schreibe den Text im Stil von Shakespeare:\n\n{{text}}",
    "prompt_template4": "Bullshit Bingo. Wenn ein Begriff aus der Kategorie Berufsleben/Management im transkribierten Text auftaucht, dann mache ihn in der enriched Version Fett:\n\n{{text}}"
  }
}
EOF

      - name: Upload as artifact
        uses: actions/upload-artifact@v4
        with:
          name: voice-intel-windows-portable
          path: release/
          retention-days: 7
